name: Pyright

# on:
#   pull_request:
#     branches:
#       - master
#       - main
#       - dev
on: [repository_dispatch, workflow_dispatch]

jobs:
  pyright:
    # SAWRA >> USE_MATRIX
    # runs-on: ubuntu-latest
    runs-on: ${{ matrix.os }}

    # SAWRA >> USE_MATRIX
    strategy:
      matrix:
        os: [ubuntu-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v4

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyright
    - name: Run Pyright
      run: pyright . --level error